name: build-and-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore InferHub.sln

      - name: Build
        run: dotnet build InferHub.sln --configuration Release --no-restore

      # The Postgres vector-store tests are gated on INFERHUB_TEST_POSTGRES, which is not set
      # here — they skip visibly rather than silently, and the rest of the suite runs.
      - name: Test
        run: dotnet test tests/InferHub.Tests --configuration Release --no-build --verbosity normal

  docker-build:
    # A broken Dockerfile should fail on the PR, not at the tag — but nothing is pushed here.
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image:
          - { name: coordinator, dockerfile: src/InferHub.Coordinator/Dockerfile }
          - { name: node,        dockerfile: src/InferHub.Node/Dockerfile }

    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
