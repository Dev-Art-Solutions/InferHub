# Passive failover in front of two InferHub coordinators (phase 32).
#
# This is deliberately the dumbest thing that works, because the hub does not become a load
# balancer and this file is an example, not a product. A real deployment uses whatever it already
# runs — HAProxy, an ELB/ALB, Traefik, DNS failover. What matters is that InferHub gives that front
# honest signals to act on:
#
#   * `X-InferHub-Role: active|standby` on every response
#   * `role` on GET /health (which is 200 on a standby — a standby *is* healthy, it just is not
#     leading; reporting it unhealthy would have an orchestrator restart-loop the instance that is
#     supposed to be sitting quietly)
#   * 503 + Retry-After on any inference route against a standby
#
# The 503 is what drives failover here: nginx retries the next upstream on it, so a request that
# lands on the standby is transparently re-sent to the hub that holds the lease. Streaming
# responses are proxied unbuffered so SSE and NDJSON arrive token by token rather than in one lump
# at the end.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream inferhub_hubs {
    server coordinator:8080         max_fails=0;
    server coordinator-standby:8080 max_fails=0 backup;
}

server {
    listen 80;

    # An inference request can sit on a GPU for minutes; the default 60s read timeout would cut
    # a long generation off mid-stream and look like a mesh bug.
    proxy_read_timeout    600s;
    proxy_send_timeout    600s;
    proxy_connect_timeout 5s;

    location / {
        proxy_pass http://inferhub_hubs;
        proxy_http_version 1.1;

        # The node hub is SignalR: websockets need the upgrade headers to survive the hop.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # A standby answers 503; try the other hub before giving up on the client.
        proxy_next_upstream error timeout http_503;
        proxy_next_upstream_tries 2;

        # Token-by-token, not one lump at the end.
        proxy_buffering off;
        chunked_transfer_encoding on;
    }
}
