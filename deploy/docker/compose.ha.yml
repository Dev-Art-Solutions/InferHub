# Overlay: a second coordinator as a warm standby, plus an nginx front so clients have one
# address (phase 32, v3.0.0). Apply it *after* the base file and the postgres overlay — later
# files win, and HA requires the postgres provider because that is where the durable truth lives:
#
#   docker compose -f deploy/docker/docker-compose.yml \
#                  -f deploy/docker/compose.postgres.yml \
#                  -f deploy/docker/compose.ha.yml up -d
#
# Exactly one coordinator holds the lease and serves inference; the other runs standby, answering
# /health, /api/status and /metrics but returning 503 on every inference route. Both read and write
# the SAME Postgres — there is no second source of truth, and no data migration on failover.
#
# ⚠ `coordinator-standby` is a container name, not a role. Which hub leads is decided by whoever
#   takes the lease first, so on a cold start either one may be active. Ask /health.
#
# ⚠ The hub does not become a load balancer. `front` below is an ordinary nginx doing passive
#   failover; a real deployment would use whatever it already runs (HAProxy, an ELB, DNS). What
#   InferHub gives that front is honest signals: `X-InferHub-Role: active|standby` on every
#   response, `role` on /health, and a 503 + Retry-After on inference against a standby.

services:
  coordinator:
    environment:
      Cluster__Enabled: "true"
      Cluster__InstanceId: "hub-a"
      Cluster__ConnectionString: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-inferhub};Username=${POSTGRES_USER:-inferhub};Password=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/docker/.env}"
      Cluster__LeaseTtlSeconds: "${INFERHUB_LEASE_TTL:-15}"
      Cluster__RenewIntervalSeconds: "${INFERHUB_LEASE_RENEW:-5}"

      # Usage is durable too, so an invoice survives a failover rather than restarting from zero
      # on whichever hub happens to be leading.
      Usage__Persistence: "postgres"
      Usage__Postgres__ConnectionString: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-inferhub};Username=${POSTGRES_USER:-inferhub};Password=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/docker/.env}"

  coordinator-standby:
    build:
      context: ../..
      dockerfile: src/InferHub.Coordinator/Dockerfile
    image: ghcr.io/dev-art-solutions/inferhub-coordinator:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      Auth__ApiKeys__0: "${INFERHUB_API_KEY:?set INFERHUB_API_KEY in deploy/docker/.env}"
      Auth__AdminApiKeys__0: "${INFERHUB_ADMIN_KEY:?set INFERHUB_ADMIN_KEY in deploy/docker/.env}"
      Auth__NodeEnrollmentSecret: "${INFERHUB_NODE_SECRET:?set INFERHUB_NODE_SECRET in deploy/docker/.env}"

      Cluster__Enabled: "true"
      Cluster__InstanceId: "hub-b"
      Cluster__ConnectionString: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-inferhub};Username=${POSTGRES_USER:-inferhub};Password=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/docker/.env}"
      Cluster__LeaseTtlSeconds: "${INFERHUB_LEASE_TTL:-15}"
      Cluster__RenewIntervalSeconds: "${INFERHUB_LEASE_RENEW:-5}"

      # The same Postgres, the same collections, the same ledger. That is the whole design:
      # the coordinators are interchangeable readers/writers of one store, not two authorities.
      VectorStore__Enabled: "true"
      VectorStore__Provider: "postgres"
      VectorStore__Postgres__ConnectionString: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-inferhub};Username=${POSTGRES_USER:-inferhub};Password=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/docker/.env}"
      Usage__Persistence: "postgres"
      Usage__Postgres__ConnectionString: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-inferhub};Username=${POSTGRES_USER:-inferhub};Password=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/docker/.env}"
    ports:
      - "${INFERHUB_STANDBY_PORT:-5081}:8080"
    networks:
      - inferhub
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  node:
    environment:
      # Both hubs, in order. The node tries each in turn; a standby refuses the handshake with a
      # 503, so rotation is how the node finds whoever holds the lease right now.
      Coordinator__Endpoints__0: "http://coordinator:8080/"
      Coordinator__Endpoints__1: "http://coordinator-standby:8080/"

  front:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - coordinator
      - coordinator-standby
    # The client address. The two hubs keep their own published ports as well (the base file
    # gives the active one ${INFERHUB_PORT}, and the standby is exposed below) — a failover
    # runbook you can only follow through the load balancer is a runbook you cannot debug.
    ports:
      - "${INFERHUB_HA_PORT:-5079}:80"
    volumes:
      - ./ha/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - inferhub
