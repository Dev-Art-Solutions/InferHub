# Local Qdrant for InferHub's gated vector-store integration tests, and for running the
# coordinator against a real Qdrant.
#
#   docker compose -f deploy/qdrant/docker-compose.yml up -d
#   $env:INFERHUB_TEST_QDRANT = "http://localhost:6333"
#   dotnet test tests/InferHub.Tests
#
# Without INFERHUB_TEST_QDRANT set, the Qdrant integration tests skip (visibly) and the rest of
# the suite runs unchanged.
#
# To point the coordinator at it:
#   VectorStore:Enabled=true, VectorStore:Provider=qdrant, VectorStore:Qdrant:Url=http://localhost:6333
services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC (unused by InferHub — the connector speaks REST)
    volumes:
      - inferhub_qdrant:/qdrant/storage
    healthcheck:
      # Qdrant's readiness probe; the image ships no curl, so hit /readyz from Qdrant itself.
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  inferhub_qdrant:
