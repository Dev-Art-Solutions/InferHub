<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>InferHub — console</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --panel-border: #232936;
      --text: #e4e7ee;
      --muted: #8b94a7;
      --accent: #4ea1ff;
      --ok: #4ade80;
      --warn: #facc15;
      --err: #f87171;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    body { background: var(--bg); color: var(--text); margin: 0; padding: 32px; line-height: 1.4; }
    header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    h1 { font-size: 20px; margin: 0; letter-spacing: 0.4px; }
    h1 a { color: var(--accent); text-decoration: none; font-size: 13px; margin-left: 12px; }
    h1 a:hover { text-decoration: underline; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin: 0 0 12px; }
    .meta { color: var(--muted); font-size: 13px; }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-bottom: 32px; }
    .card { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 8px; padding: 16px; }
    .stat { font-size: 28px; font-weight: 600; margin: 4px 0 0; }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
    .table-wrap { overflow-x: auto; background: var(--panel); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; font-size: 13px; border-bottom: 1px solid var(--panel-border); vertical-align: top; }
    th { color: var(--muted); font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 0.6px; }
    tr:last-child td { border-bottom: none; }
    tr.row-error td { background: rgba(248, 113, 113, 0.06); }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; margin-right: 4px; }
    .pill-ok { background: rgba(74, 222, 128, 0.12); color: var(--ok); }
    .pill-warn { background: rgba(250, 204, 21, 0.12); color: var(--warn); }
    .pill-err { background: rgba(248, 113, 113, 0.12); color: var(--err); }
    .pill-muted { background: rgba(139, 148, 167, 0.18); color: var(--muted); }
    .empty { color: var(--muted); font-style: italic; padding: 16px; text-align: center; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    button {
      background: transparent; color: var(--text); border: 1px solid var(--panel-border);
      border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer;
      font-family: inherit; transition: background 0.12s, border-color 0.12s;
    }
    button:hover:not(:disabled) { background: rgba(255,255,255,0.04); border-color: var(--muted); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.danger { color: var(--err); border-color: rgba(248, 113, 113, 0.35); }
    button.danger:hover:not(:disabled) { background: rgba(248, 113, 113, 0.08); border-color: var(--err); }
    button.primary { color: var(--accent); border-color: rgba(78, 161, 255, 0.35); }
    button.primary:hover:not(:disabled) { background: rgba(78, 161, 255, 0.08); border-color: var(--accent); }
    .row-msg { font-size: 12px; color: var(--err); margin-top: 6px; }
    .row-msg.info { color: var(--accent); }
    section { margin-bottom: 32px; }
    code { background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 4px; font-size: 12px; }
    .labels { display: flex; flex-wrap: wrap; gap: 4px; max-width: 220px; }
    .label-chip { font-size: 11px; padding: 1px 6px; border-radius: 4px; background: rgba(255,255,255,0.06); color: var(--muted); white-space: nowrap; }
    .auth-bar {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      background: var(--panel); border: 1px solid var(--panel-border); border-radius: 8px;
      margin-bottom: 24px; font-size: 13px;
    }
    .auth-bar.warn { border-color: rgba(250, 204, 21, 0.4); }
    .auth-state { color: var(--muted); }
    .auth-state.ok { color: var(--ok); }
    .auth-state.missing { color: var(--warn); }
    .spacer { flex: 1; }
    @media (max-width: 720px) {
      body { padding: 16px; }
      th, td { padding: 8px 10px; font-size: 12px; }
      .actions { flex-direction: column; align-items: stretch; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>
      InferHub console
      <a href="/status.html">read-only status →</a>
      <span class="meta" id="version">·</span>
    </h1>
    <div class="meta">
      uptime <span id="uptime">—</span> · refreshed <span id="refreshed">—</span>
    </div>
  </header>

  <div class="auth-bar" id="auth-bar">
    <span>Admin key:</span>
    <span class="auth-state" id="auth-state">not set (read-only)</span>
    <span class="spacer"></span>
    <button id="auth-set">Set admin key…</button>
    <button id="auth-clear" disabled>Clear</button>
  </div>

  <section>
    <h2>Fleet</h2>
    <div class="grid" id="stats"></div>
  </section>

  <section>
    <h2>Nodes</h2>
    <div class="table-wrap">
      <table id="nodes-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Node id</th>
            <th>Endpoint</th>
            <th>State</th>
            <th>In-flight</th>
            <th>Max</th>
            <th>Labels</th>
            <th>Last seen</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="nodes"></tbody>
      </table>
    </div>
  </section>

  <section>
    <h2>Models</h2>
    <div class="table-wrap">
      <table id="models-table">
        <thead>
          <tr><th>Name</th><th>Digest</th><th>Size</th></tr>
        </thead>
        <tbody id="models"></tbody>
      </table>
    </div>
  </section>

  <script src="/console.js"></script>
</body>
</html>
